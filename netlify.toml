[build]
  command = "npm run build"
  publish = "out"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://www.google-analytics.com https://api.brevo.com; frame-src https://b063a5c1.sibforms.com; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'"

# Static file pass-throughs
[[redirects]]
  from = "/*.xml"
  to = "/:splat.xml"
  status = 200

[[redirects]]
  from = "/*.txt"
  to = "/:splat.txt"
  status = 200

[[redirects]]
  from = "/*.html"
  to = "/:splat.html"
  status = 200

# News section retired
[[redirects]]
  from = "/news/"
  to = "/insights/"
  status = 301

[[redirects]]
  from = "/news"
  to = "/insights/"
  status = 301

[[redirects]]
